# fly.toml app configuration file generated for message-board-suntech on 2026-05-29T01:29:32+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'message-board-suntech'
primary_region = 'nrt'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = "8.4"

[env]
  APP_URL = 'https://message-board-suntech.fly.dev/'
  APP_NAME = 'message-board'
  APP_DEBUG = false
  DB_CONNECTION = 'pgsql'
  DB_HOST = 'aws-1-ap-northeast-1.pooler.supabase.com'
  DB_PORT = 6543
  DB_DATABASE = 'postgres'
  DB_USERNAME = 'postgres.gohmediwybgwmzvhuroi'
  APP_ENV = 'production'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  SESSION_DRIVER = 'cookie'
  SESSION_SECURE_COOKIE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
